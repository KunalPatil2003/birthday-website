<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:black;
  font-family:Arial;
  color:white;
  overflow:hidden;

 padding:
        env(safe-area-inset-top)
        env(safe-area-inset-right)
        env(safe-area-inset-bottom)
        env(safe-area-inset-left);
}
*{
    -webkit-user-select:none;
    user-select:none;
}
.p5{
    background:linear-gradient(135deg,#080012,#1c002d);
    display:flex;
    justify-content:center;
    align-items:center;
}
#quoteContainer{

    width:90%;
    height:90%;

    display:grid;

    grid-template-columns:repeat(2,1fr);

    grid-auto-rows:minmax(80px,auto);

    gap:25px;

    align-content:start;

    overflow-y:auto;

    padding:20px;

}

.memory{

    padding:18px;

    border-radius:18px;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(12px);

    color:white;

    font-size:22px;

    line-height:1.6;

    box-shadow:0 0 25px rgba(255,77,109,.35);

    opacity:0;

    animation:fadeIn .8s forwards;

}
.memory.final{

    grid-column:1 / 3;

    justify-self:center;

    width:80%;

    max-width:900px;

    text-align:center;

    font-size:34px;

    font-weight:bold;

    line-height:1.8;

    color:#ffd7e8;

    border:2px solid rgba(255,77,109,.5);

    box-shadow:
        0 0 30px rgba(255,77,109,.5);

    margin-top:20px;

}

@keyframes fadeIn{

    from{

        opacity:0;
        transform:translateY(40px) scale(.8);

    }

    to{

        opacity:1;
        transform:translateY(0) scale(1);

    }

}
/* swipe */
.container{
  display:flex;
  width:500vw;
  height:100vh;
  transition:transform 0.6s ease;
}

.page{
  width:100vw;
  height:100vh;
  flex-shrink:0;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  padding:20px;
  box-sizing:border-box;
}

/* backgrounds */
.p1{background:#120018;}
.p2{background:#1a0025;}
.p3{background:#000;}
.p4{background:#140010;}

/* HEADINGS */
h1{color:#ff4d6d;}

/* IMAGE BOX */
img{

    max-width:90vw;

    max-height:70vh;

    width:auto;

    height:auto;

    object-fit:contain;

    border-radius:20px;

    border:4px solid #ff4d6d;

    box-shadow:
        0 0 20px #ff4d6d,
        0 0 40px rgba(255,77,109,.5);

    margin-top:20px;

}

.gif{

    width:80%;
    max-width:700px;

    height:70vh;

    object-fit:cover;

    border-radius:20px;

    border:4px solid #ff4d6d;

}

/* dots */
.dots{
  position:fixed;
  bottom:15px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:8px;
}

.dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:#555;
}
.nav{

position:fixed;

top:50%;

left:0;

width:100%;

display:flex;

justify-content:space-between;

transform:translateY(-50%);

pointer-events:none;

}

.nav button{

pointer-events:auto;

background:rgba(255,77,109,.8);

color:white;

border:none;

padding:15px 22px;

font-size:28px;

cursor:pointer;

margin:20px;

border-radius:50%;

}
.active{background:#ff4d6d;}

/* ===========================
   MOBILE RESPONSIVE
=========================== */

@media (max-width:768px){

    /* Hide navigation arrows */
    .nav{
        display:none;
    }

    /* Smaller headings */
    h1{
        font-size:1.5rem;
        line-height:1.4;
        padding:0 15px;
    }

    /* Bigger image */
    img{

        width:95%;
        max-width:none;

        height:auto;
        max-height:60vh;

        object-fit:contain;

    }

    /* Quotes become single column */
    #quoteContainer{

        grid-template-columns:1fr;

        width:95%;

        gap:18px;

        padding:10px;

    }

    /* Last quote also single column */
    .memory.final{

        grid-column:1;

        width:100%;

        font-size:24px;

    }

    /* Smaller quote cards */
    .memory{

        font-size:18px;

        padding:14px;

    }

}
</style>
</head>

<body>

<div class="container" id="slider">

  <!-- PAGE 1 -->
  <div class="page p1">
    <h1>Happy Birthday ❤️</h1>

    <!-- 🖼️ PHOTO 1 PLACE -->
    <img src="photo1.jpg" alt="photo1">
  </div>

  <!-- PAGE 2 -->
  <div class="page p2">
    <h1>Disclaimer: The next image may be offensive. But if you know me, you already know—my humor doesn't discriminate. Everyone's fair game. 😂</h1>

    <!-- 🖼️ PHOTO 2 PLACE -->
    <img src="photo2.jpg" alt="photo2">
    <!-- 👉 PUT SECOND IMAGE HERE -->
  </div>

  <!-- PAGE 3 -->
  <div class="page p3">
    <h1>Did that offend you? Good news—the next image comes with a complimentary antidote. 😉</h1>

   <img src="photo3.jpg" alt="photo3">

  </div>

  <!-- PAGE 4 -->
  <div class="page p4">
    <h1>😅😅😂😂😂</h1>

    <img src="photo4.jpg" alt="photo4">
  </div>

<!-- PAGE 5 -->
<div class="page p5">

    <div id="quoteContainer"></div>

</div>

</div>
<div class="nav">

<button id="prev">❮</button>

<button id="next">❯</button>

</div>
<!-- DOTS -->
<div class="dots">
  <div class="dot active"></div>
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
</div>
<audio id="music" loop>
    <source src="audio.mp3" type="audio/mpeg">
</audio>
<script>

let index = 0;

const slider = document.getElementById("slider");
const dots = document.querySelectorAll(".dot");

function updateSlider(){

    slider.style.transform = `translateX(-${index * 100}vw)`;

    dots.forEach(dot => dot.classList.remove("active"));
    dots[index].classList.add("active");

    const song = document.getElementById("music");
  console.log("Audio element:", song);

    if(index === 4){

        showQuotes();

        if(song){

            song.volume = 0.2;

            song.play().catch(()=>{});

            let fade = setInterval(()=>{

                if(song.volume < 1){

                    song.volume = Math.min(song.volume + 0.05, 1);

                }else{

                    clearInterval(fade);

                }

            },300);

        }

    }else{

        if(song){

            song.pause();

            song.currentTime = 0;

        }

    }

}


document.getElementById("next").onclick = () => {

    if(index < 4){
        index++;
        updateSlider();
    }

};

document.getElementById("prev").onclick = () => {

    if(index > 0){
        index--;
        updateSlider();
    }

};



let startX = 0;

document.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {

    let endX = e.changedTouches[0].clientX;

    if(startX - endX > 50 && index < 4){
        index++;
    }

    if(endX - startX > 50 && index > 0){
        index--;
    }

    updateSlider();

});


document.addEventListener("keydown", e => {

    if(e.key === "ArrowRight" && index < 4){
        index++;
        updateSlider();
    }

    if(e.key === "ArrowLeft" && index > 0){
        index--;
        updateSlider();
    }

});

const quotes = [

"And I will meet you where the sky ends. Where the eternity begins ❤️",

"All roads lead to you, even those I took to forget you.",

"I imagine you in every empty seat I sit beside.",

"now, I'm even losing my name- It was getting shorter and shorter all the time and is now Your's.",

"If we were two sunflowers I would have faced you - instead of the sun.",

"I am crowded by your absence.",

"Your eyes a war I do not mind dying in.",

"I love talking to you, even if I have nothing to say.",

"You Giggles I Melt",

"My entire sky craves only your stars.",

"Today the world feels gentler because you arrived in it. May this new year hold you softly, return your kindness to you in quite ways, and remind you - again and again - that your existence is a gift time itself celebrates."

];


let loaded=false;

function showQuotes(){

    if(loaded) return;

    loaded = true;

    const container = document.getElementById("quoteContainer");

    quotes.forEach((text,i)=>{

        setTimeout(()=>{

            const div = document.createElement("div");

            div.className = "memory";

            if(i === quotes.length - 1){
                div.classList.add("final");
            }

            div.innerHTML = text;

            container.appendChild(div);

        }, i * 1800);

    });

}
window.addEventListener("resize", () => {
    updateSlider();
});
</script>

</body>
</html>
